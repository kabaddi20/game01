<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Mobile Tetris</title>

<style>
body{
    margin:0;
    background:#111;
    color:white;
    text-align:center;
    font-family:sans-serif;
}

canvas{
    background:#000;
    border:2px solid #fff;
    margin-top:10px;
}

.controls{
    margin-top:15px;
}

button{
    width:70px;
    height:70px;
    font-size:24px;
    margin:5px;
    border:none;
    border-radius:12px;
    background:#333;
    color:white;
}

button:active{
    background:#555;
}
</style>
</head>
<body>

<h2>テトリス</h2>
<p>Score: <span id="score">0</span></p>

<canvas id="game" width="300" height="600"></canvas>

<div class="controls">
    <button id="left">◀</button>
    <button id="rotate">↻</button>
    <button id="right">▶</button>
    <button id="down">▼</button>
</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const COLS = 10;
const ROWS = 20;
const BLOCK = 30;

const board = Array.from({length: ROWS},
    () => Array(COLS).fill(0));

const colors = [
    null,
    "#00FFFF",
    "#FFFF00",
    "#800080",
    "#00FF00",
    "#FF0000",
    "#0000FF",
    "#FFA500"
];

const pieces = [
    [],
    [[1,1,1,1]],
    [[2,2],[2,2]],
    [[0,3,0],[3,3,3]],
    [[0,4,4],[4,4,0]],
    [[5,5,0],[0,5,5]],
    [[6,0,0],[6,6,6]],
    [[0,0,7],[7,7,7]]
];

let score = 0;

function newPiece() {
    const type = Math.floor(Math.random()*7)+1;
    return {
        x: 3,
        y: 0,
        shape: pieces[type],
        color: type
    };
}

let player = newPiece();

function drawCell(x,y,color){
    ctx.fillStyle = color;
    ctx.fillRect(x*BLOCK,y*BLOCK,BLOCK,BLOCK);
    ctx.strokeStyle="#222";
    ctx.strokeRect(x*BLOCK,y*BLOCK,BLOCK,BLOCK);
}

function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);

    for(let y=0;y<ROWS;y++){
        for(let x=0;x<COLS;x++){
            if(board[y][x]){
                drawCell(x,y,colors[board[y][x]]);
            }
        }
    }

    player.shape.forEach((row,dy)=>{
        row.forEach((value,dx)=>{
            if(value){
                drawCell(
                    player.x+dx,
                    player.y+dy,
                    colors[player.color]
                );
            }
        });
    });
}

function collision(){
    for(let y=0;y<player.shape.length;y++){
        for(let x=0;x<player.shape[y].length;x++){
            if(player.shape[y][x]){
                let newX = player.x+x;
                let newY = player.y+y;

                if(
                    newX < 0 ||
                    newX >= COLS ||
                    newY >= ROWS ||
                    (newY >= 0 &&
                    board[newY][newX])
                ){
                    return true;
                }
            }
        }
    }
    return false;
}

function merge(){
    player.shape.forEach((row,y)=>{
        row.forEach((value,x)=>{
            if(value){
                board[player.y+y][player.x+x]=player.color;
            }
        });
    });
}

function clearLines(){
    let lines = 0;

    for(let y=ROWS-1;y>=0;y--){
        if(board[y].every(cell=>cell)){
            board.splice(y,1);
            board.unshift(Array(COLS).fill(0));
            lines++;
            y++;
        }
    }

    score += lines * 100;
    document.getElementById("score").textContent = score;
}

function rotate(){
    const shape = player.shape;
    const rotated = shape[0].map((_,i)=>
        shape.map(row=>row[i]).reverse()
    );

    const old = player.shape;
    player.shape = rotated;

    if(collision()){
        player.shape = old;
    }
}

function drop(){
    player.y++;

    if(collision()){
        player.y--;
        merge();
        clearLines();

        player = newPiece();

        if(collision()){
            alert("ゲームオーバー");
            location.reload();
        }
    }
}

document.getElementById("left").addEventListener("click",()=>{
    player.x--;
    if(collision()) player.x++;
});

document.getElementById("right").addEventListener("click",()=>{
    player.x++;
    if(collision()) player.x--;
});

document.getElementById("down").addEventListener("click",()=>{
    drop();
});

document.getElementById("rotate").addEventListener("click",()=>{
    rotate();
});

document.addEventListener("keydown",(e)=>{
    if(e.key==="ArrowLeft"){
        player.x--;
        if(collision()) player.x++;
    }
    if(e.key==="ArrowRight"){
        player.x++;
        if(collision()) player.x--;
    }
    if(e.key==="ArrowDown"){
        drop();
    }
    if(e.key==="ArrowUp"){
        rotate();
    }
});

let lastTime = 0;

function update(time=0){
    if(time-lastTime > 500){
        drop();
        lastTime = time;
    }

    draw();
    requestAnimationFrame(update);
}

update();
</script>

</body>
</html>
